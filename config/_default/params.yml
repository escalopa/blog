mainSections:
  - post

rssFullContent: true

favicon: favicon.ico
footer:
  since: 2022
  customText: ''

dateFormat:
  published: 'Jan 02, 2006'
  lastUpdated: 'Jan 02, 2006 15:04 MST'

sidebar:
  emoji: "🐱" #🇪🇬🇷🇺
  subtitle: Software Engineer
  avatar:
    enabled: true
    local: true
    src: images/avatar.png

article:
  math: false
  readingTime: true
  license:
    enabled: true
    default: Licensed MIT

widgets:
  homepage:
    - type: search
    - type: archives
      params:
        limit: 5
    - type: categories
      params:
        limit: 10
    - type: tag-cloud
      params:
        limit: 10
  page:
    - type: toc

opengraph:
  twitter:
    site: ''
    card: summary_large_image

defaultImage:
  opengraph:
    enabled: false
    local: false
    src: ''

colorScheme:
  toggle: true
  default: auto

imageProcessing:
  cover:
    enabled: true
  content:
    enabled: true

shareButtons:
  networks:
    - facebook
    - twitter
    # - tumblr
    # - email
    # - pinterest
    - linkedin
    - reddit
    # - xing
    # - whatsapp
    # - hackernews
    - vk
    - telegram
  size: small
  icon: solid
  buttonMargin: 0.2em